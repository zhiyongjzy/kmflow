name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxi-dev libxrandr-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build (no wayland)
        run: cargo build --workspace --no-default-features --features x11

      - name: Test
        run: cargo test --workspace
